<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="80" fill="url(#bgGradient)"/>

  <!-- Subtle border -->
  <rect x="8" y="8" width="496" height="496" rx="72" fill="none" stroke="#1e40af" stroke-width="4" opacity="0.5"/>

  <!-- Text: BD -->
  <text
    x="256"
    y="256"
    font-family="-apple-system, system-ui, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif"
    font-size="240"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="-8">BD</text>

  <!-- Accent dot (design element) -->
  <circle cx="420" cy="420" r="24" fill="#60a5fa" opacity="0.8"/>
</svg>
